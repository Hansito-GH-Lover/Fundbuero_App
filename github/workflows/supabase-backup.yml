- name: Create backup zip
  run: |
    TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    BACKUP_NAME="backup-${TIMESTAMP}.zip"
    zip -r "${BACKUP_NAME}" . -x ".git/*" "node_modules/*" ".github/*"
    echo "BACKUP_FILE=${BACKUP_NAME}" >> $GITHUB_OUTPUT
  shell: bash

- name: Upload to Supabase Storage
  env:
    SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    BACKUP_FILE: ${{ steps.create_backup_zip.outputs.BACKUP_FILE || '' }}
  run: |
    # Fallback: if BACKUP_FILE not in outputs, find latest zip
    if [ -z "${BACKUP_FILE}" ]; then
      BACKUP_FILE=$(ls -t backup-*.zip | head -n1)
    fi
    echo "Uploading ${BACKUP_FILE} to Supabase Storage bucket <BUCKET_NAME> as latest.zip"
    # Use curl to call Supabase Storage REST API. We upload to object path latest.zip (overwrites).
    # The storage base URL is: ${SUPABASE_URL}/storage/v1/object/<bucket>
    UPLOAD_URL="${SUPABASE_URL}/storage/v1/object/<BUCKET_NAME>/latest.zip"
    HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
      -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
      -H "Content-Type: application/zip" \
      --data-binary @"${BACKUP_FILE}" \
      "${UPLOAD_URL}")
    echo "HTTP status: ${HTTP_STATUS}"
    if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
      echo "Upload successful"
    else
      echo "Upload failed with status ${HTTP_STATUS}"
      exit 1
    fi
  shell: bash
